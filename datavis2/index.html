<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Corporate Budget Distribution — Squarified Treemap</title>
<style>
  :root{
    --bg:#090d16;
    --panel:#0d1220;
    --border:#1c2436;
    --text:#e7edf7;
    --muted:#8993ab;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:-apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 40px;
  }
  h1{
    margin:0 0 4px;
    font-size:26px;
    font-weight:800;
    letter-spacing:0.3px;
  }
  .subtitle{
    margin:0 0 22px;
    font-size:13px;
    color:var(--muted);
    letter-spacing:0.2px;
  }
  #wrap{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
  }
  canvas{
    display:block;
    border-radius:6px;
  }
</style>
</head>
<body>

<h1>Corporate Budget Distribution</h1>
<p class="subtitle">Squarified Treemap Engine — Aspect-Ratio Optimized for Golden Ratio Bounds (~1:1.605)</p>

<div id="wrap">
  <canvas id="treemapCanvas" width="1360" height="760"></canvas>
</div>

<script src="main.js"></script>
</body>
</html>
